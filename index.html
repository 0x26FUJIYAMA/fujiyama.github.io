<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FUJIYAMA — Booking Automation for Southeast Asia</title>
<meta name="description" content="FUJIYAMA handles every booking request on LINE & WhatsApp automatically. No missed calls. No late-night replies. Built for small businesses in Southeast Asia." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: #080810; color: #E8E4DC; font-family: 'IM Fell English', Georgia, serif; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #080810; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  button, a { cursor: pointer; }
  a { text-decoration: none; color: inherit; }
  ::selection { background: rgba(232,130,58,0.3); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSekZocD7xerK_lebkIp7bZh3arsWNu2cDFNOSbQEe2cg6sMBw/viewform?usp=header";
const GOLD = "#E8823A";
const MONO = "'DM Mono', 'Courier New', monospace";
const SERIF = "'IM Fell English', Georgia, serif";

const scenarios = [
  {
    id: "book",
    label: "📅  New booking",
    customerMsg: "Hi! I'd like to book a Thai massage for tomorrow at 3pm for 2 people 🙏",
    steps: [
      { from: "bot", text: "Hi! Thanks for reaching out to Mook's Thai Massage 🌸", delay: 800 },
      { from: "bot", text: "I have availability tomorrow at 3:00 PM for 2 guests. Each session is 60 min — shall I confirm that for you?", delay: 1900 },
      { from: "customer", text: "Yes please!", delay: 3000 },
      { from: "bot", text: "✅ Confirmed!\n\n📍 Mook's Thai Massage\n📅 Tomorrow, 3:00 PM\n👥 2 guests · 60 min each\n\nWe'll send a reminder 2 hours before. See you! 🙏", delay: 4000 },
      { from: "owner", text: "🔔 New booking added to your calendar. No action needed.", delay: 5000 },
    ],
  },
  {
    id: "cancel",
    label: "❌  Cancellation",
    customerMsg: "Sorry, I need to cancel my appointment for Friday 2pm 😞",
    steps: [
      { from: "bot", text: "No problem at all! I found your booking for Friday at 2:00 PM.", delay: 800 },
      { from: "bot", text: "Your appointment has been cancelled. Would you like to reschedule? 🌸", delay: 1900 },
      { from: "customer", text: "Maybe next week? Wednesday?", delay: 3000 },
      { from: "bot", text: "Wednesday I have 11:00 AM or 4:00 PM available. Which works best for you?", delay: 3900 },
      { from: "customer", text: "4pm works!", delay: 4900 },
      { from: "bot", text: "✅ Rescheduled to next Wednesday at 4:00 PM. See you then! 🙏", delay: 5800 },
      { from: "owner", text: "🔔 Booking rescheduled. Calendar is up to date.", delay: 6700 },
    ],
  },
  {
    id: "slots",
    label: "🕐  Check slots",
    customerMsg: "What times do you have free this weekend?",
    steps: [
      { from: "bot", text: "Here's what's available this weekend 📅", delay: 800 },
      { from: "bot", text: "Saturday:\n• 10:00 AM ✅\n• 1:00 PM ✅\n• 3:30 PM ✅\n\nSunday:\n• 11:00 AM ✅\n• 2:00 PM ✅\n\nWhich works for you?", delay: 1800 },
      { from: "customer", text: "Saturday 1pm for 1 person!", delay: 3100 },
      { from: "bot", text: "Perfect! Booking Saturday at 1:00 PM for 1 guest — confirm?", delay: 4000 },
      { from: "customer", text: "Yes!", delay: 4900 },
      { from: "bot", text: "✅ All set! See you Saturday at 1pm 🌸", delay: 5700 },
      { from: "owner", text: "🔔 Saturday 1 PM booked. No action needed from you.", delay: 6500 },
    ],
  },
  {
    id: "faq",
    label: "💬  FAQ / Pricing",
    customerMsg: "Do you do couples massage? How much is it?",
    steps: [
      { from: "bot", text: "Yes! We offer couples massage 🌸", delay: 800 },
      { from: "bot", text: "Couples Thai Massage (same room):\n• 60 min — 1,200 THB\n• 90 min — 1,700 THB\n\nIncludes herbal tea & aroma oil 🍵", delay: 1900 },
      { from: "customer", text: "Amazing! Can we book Saturday evening?", delay: 3200 },
      { from: "bot", text: "Saturday evening I have 6:00 PM or 7:30 PM for couples. Which do you prefer?", delay: 4100 },
      { from: "customer", text: "7:30 please 🙏", delay: 5000 },
      { from: "bot", text: "✅ Couples massage — Saturday 7:30 PM, 60 min. See you both! 🌸", delay: 5900 },
      { from: "owner", text: "🔔 Couples booking added. Your Saturday evening is sorted.", delay: 6800 },
    ],
  },
];

/* ── Chat bubble ── */
function Bubble({ msg, visible }) {
  const isCustomer = msg.from === "customer";
  if (msg.from === "owner") return (
    <div style={{ opacity:visible?1:0, transform:visible?"translateY(0)":"translateY(8px)", transition:"all 0.4s ease", display:"flex", justifyContent:"center", margin:"14px 0 2px" }}>
      <div style={{ background:"rgba(232,130,58,0.1)", border:"1px solid rgba(232,130,58,0.22)", borderRadius:"8px", padding:"8px 14px", fontSize:"11px", color:GOLD, fontFamily:MONO, letterSpacing:"0.02em", maxWidth:"90%", textAlign:"center" }}>
        {msg.text}
      </div>
    </div>
  );
  return (
    <div style={{ opacity:visible?1:0, transform:visible?"translateY(0)":"translateY(10px)", transition:"all 0.35s ease", display:"flex", flexDirection:"column", alignItems:isCustomer?"flex-end":"flex-start", margin:"5px 0" }}>
      {!isCustomer && <div style={{ fontSize:"10px", color:"#555", marginBottom:"3px", paddingLeft:"4px", fontFamily:MONO }}>FUJIYAMA</div>}
      <div style={{
        background: isCustomer ? "linear-gradient(135deg,#E8823A,#c96820)" : "rgba(255,255,255,0.07)",
        border: isCustomer ? "none" : "1px solid rgba(255,255,255,0.08)",
        borderRadius: isCustomer ? "16px 16px 4px 16px" : "16px 16px 16px 4px",
        padding:"11px 15px", maxWidth:"84%", fontSize:"12.5px", lineHeight:"1.65",
        color: isCustomer ? "#fff" : "#D0CCC4", fontFamily:SERIF, whiteSpace:"pre-line",
        boxShadow: isCustomer ? "0 2px 16px rgba(232,130,58,0.25)" : "none",
      }}>{msg.text}</div>
    </div>
  );
}

/* ── Phone ── */
function Phone({ scenario, running, steps }) {
  const ref = useRef(null);
  useEffect(() => { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [steps]);
  return (
    <div style={{ width:"292px", height:"548px", background:"#0C0C16", borderRadius:"36px", border:"1.5px solid rgba(255,255,255,0.1)", overflow:"hidden", boxShadow:"0 32px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05)", display:"flex", flexDirection:"column", flexShrink:0 }}>
      <div style={{ background:"rgba(255,255,255,0.03)", padding:"14px 16px 10px", display:"flex", alignItems:"center", gap:"10px", borderBottom:"1px solid rgba(255,255,255,0.06)", flexShrink:0 }}>
        <div style={{ width:"36px", height:"36px", borderRadius:"50%", background:"linear-gradient(135deg,#E8823A,#c96820)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"15px", flexShrink:0 }}>🌸</div>
        <div>
          <div style={{ fontSize:"12.5px", fontWeight:"700", color:"#E8E4DC", fontFamily:SERIF }}>Mook's Thai Massage</div>
          <div style={{ fontSize:"10px", color:running?GOLD:"#4CAF50", fontFamily:MONO, display:"flex", alignItems:"center", gap:"4px" }}>
            <span style={{ width:"6px", height:"6px", borderRadius:"50%", background:running?GOLD:"#4CAF50", display:"inline-block" }}/>
            {running ? "FUJIYAMA is responding…" : "Online"}
          </div>
        </div>
      </div>
      <div ref={ref} style={{ flex:1, overflowY:"auto", padding:"14px 14px 8px", display:"flex", flexDirection:"column", gap:"1px", scrollbarWidth:"none" }}>
        {!scenario ? (
          <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:"10px", color:"#3a3a4a", textAlign:"center" }}>
            <div style={{ fontSize:"30px" }}>💬</div>
            <div style={{ fontSize:"12px", fontFamily:SERIF, lineHeight:"1.8", color:"#3a3a4a" }}>Choose a scenario<br/>to see FUJIYAMA<br/>handle it live</div>
          </div>
        ) : (
          <>
            <Bubble msg={{ from:"customer", text:scenario.customerMsg }} visible={true} />
            {scenario.steps.map((s,i) => <Bubble key={i} msg={s} visible={steps>i} />)}
          </>
        )}
      </div>
      <div style={{ padding:"10px 14px 14px", background:"rgba(0,0,0,0.2)", borderTop:"1px solid rgba(255,255,255,0.05)", display:"flex", gap:"8px", alignItems:"center", flexShrink:0 }}>
        <div style={{ flex:1, height:"34px", borderRadius:"17px", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.07)" }}/>
        <div style={{ width:"34px", height:"34px", borderRadius:"50%", background:"linear-gradient(135deg,#E8823A,#c96820)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"14px", color:"#fff" }}>↑</div>
      </div>
    </div>
  );
}

/* ── Demo section ── */
function Demo() {
  const [active, setActive] = useState(null);
  const [running, setRunning] = useState(false);
  const [steps, setSteps] = useState(0);
  const timers = useRef([]);

  const run = (s) => {
    timers.current.forEach(clearTimeout); timers.current = [];
    setActive(s); setSteps(0); setRunning(true);
    s.steps.forEach((step, i) => {
      const t = setTimeout(() => {
        setSteps(i+1);
        if (i === s.steps.length-1) setRunning(false);
      }, step.delay);
      timers.current.push(t);
    });
  };

  return (
    <section id="demo" style={{ padding:"100px 24px", background:"#0E0E16", borderTop:"1px solid rgba(255,255,255,0.04)", position:"relative", overflow:"hidden" }}>
      <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", width:"700px", height:"700px", borderRadius:"50%", background:"radial-gradient(circle,rgba(232,130,58,0.04) 0%,transparent 70%)", pointerEvents:"none" }}/>
      <div style={{ maxWidth:"960px", margin:"0 auto" }}>
        <div style={{ textAlign:"center", marginBottom:"56px" }}>
          <div style={{ fontFamily:MONO, fontSize:"11px", letterSpacing:"4px", color:GOLD, textTransform:"uppercase", marginBottom:"16px" }}>— Live Demo</div>
          <h2 style={{ fontFamily:SERIF, fontSize:"clamp(26px,4vw,42px)", fontWeight:"400", color:"#E8E4DC", lineHeight:"1.2", marginBottom:"14px" }}>
            See it handle a real booking.<br/><em style={{ color:GOLD }}>Right now.</em>
          </h2>
          <p style={{ fontFamily:SERIF, fontSize:"16px", color:"#5a5a6a", maxWidth:"460px", margin:"0 auto", lineHeight:"1.9" }}>
            Pick a scenario. Watch FUJIYAMA reply automatically —<br/>while the owner does nothing.
          </p>
        </div>
        <div style={{ display:"flex", gap:"44px", alignItems:"center", justifyContent:"center", flexWrap:"wrap" }}>
          <div style={{ display:"flex", flexDirection:"column", gap:"10px", minWidth:"230px" }}>
            <div style={{ fontFamily:MONO, fontSize:"10px", letterSpacing:"3px", color:"#444", textTransform:"uppercase", marginBottom:"4px" }}>Customer sends…</div>
            {scenarios.map(s => (
              <button key={s.id} onClick={() => run(s)} style={{
                padding:"14px 18px", textAlign:"left",
                background: active?.id===s.id ? "rgba(232,130,58,0.12)" : "rgba(255,255,255,0.025)",
                border: active?.id===s.id ? "1px solid rgba(232,130,58,0.4)" : "1px solid rgba(255,255,255,0.07)",
                borderRadius:"12px", color: active?.id===s.id ? GOLD : "#666",
                fontFamily:SERIF, fontSize:"13.5px",
                transition:"all 0.2s ease",
                transform: active?.id===s.id ? "translateX(6px)" : "translateX(0)",
              }}>{s.label}</button>
            ))}
            <div style={{ marginTop:"10px", padding:"16px", background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.05)", borderRadius:"10px", fontSize:"12px", color:"#4a4a5a", fontFamily:SERIF, lineHeight:"1.8" }}>
              Works via LINE, WhatsApp,<br/>or any messaging app.<br/>
              <span style={{ color:GOLD }}>Owner never touched the phone.</span>
            </div>
          </div>
          <Phone scenario={active} running={running} steps={steps} />
        </div>
      </div>
    </section>
  );
}

/* ── Nav ── */
function Nav() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 50);
    window.addEventListener("scroll", fn);
    return () => window.removeEventListener("scroll", fn);
  }, []);
  return (
    <nav style={{ position:"fixed", top:0, left:0, right:0, zIndex:200, padding:"18px 32px", display:"flex", justifyContent:"space-between", alignItems:"center", background:scrolled?"rgba(8,8,16,0.94)":"transparent", backdropFilter:scrolled?"blur(16px)":"none", borderBottom:scrolled?"1px solid rgba(255,255,255,0.05)":"none", transition:"all 0.35s ease" }}>
      <div style={{ fontFamily:SERIF, fontSize:"20px", color:"#E8E4DC", letterSpacing:"0.08em" }}>FUJIYAMA</div>
      <div style={{ display:"flex", gap:"28px", alignItems:"center" }}>
        {[["How it works","#how"],["Demo","#demo"],["Start free","#cta"]].map(([l,h]) => (
          <a key={l} href={h} style={{ fontFamily:MONO, fontSize:"10px", color:"#555", letterSpacing:"2px", textTransform:"uppercase", transition:"color 0.2s" }}
            onMouseEnter={e=>e.target.style.color=GOLD} onMouseLeave={e=>e.target.style.color="#555"}>{l}</a>
        ))}
        <a href={FORM_URL} target="_blank" rel="noopener noreferrer">
          <button style={{ padding:"9px 20px", background:"linear-gradient(135deg,#E8823A,#c96820)", border:"none", borderRadius:"4px", color:"#fff", fontSize:"11px", fontFamily:MONO, letterSpacing:"2px", boxShadow:"0 2px 16px rgba(232,130,58,0.28)", transition:"transform 0.15s ease, box-shadow 0.15s ease" }}
            onMouseEnter={e=>{e.target.style.transform="translateY(-1px)";e.target.style.boxShadow="0 4px 20px rgba(232,130,58,0.4)"}}
            onMouseLeave={e=>{e.target.style.transform="translateY(0)";e.target.style.boxShadow="0 2px 16px rgba(232,130,58,0.28)"}}>
            START FREE
          </button>
        </a>
      </div>
    </nav>
  );
}

/* ── Hero ── */

      <div style={{ position:"absolute", bottom:"-80px", left:"-80px", width:"400px", height:"400px", borderRadius:"50%", background:"radial-gradient(circle,rgba(232,130,58,0.04) 0%,transparent 65%)", pointerEvents:"none" }}/>
      <div style={{ maxWidth:"760px", position:"relative" }}>

        </div>
        <div style={anim(0.28)}>
          <p style={{ fontFamily:SERIF, fontSize:"18px", color:"#5a5a6a", lineHeight:"1.95", marginBottom:"50px", maxWidth:"580px", margin:"0 auto 50px" }}>
            FUJIYAMA handles every booking request on LINE & WhatsApp — automatically.
            No missed calls. No late-night replies. Just customers confirmed, and you present.
          </p>
        </div>
        <div style={{ ...anim(0.42), display:"flex", gap:"14px", justifyContent:"center", flexWrap:"wrap" }}>
          <a href={FORM_URL} target="_blank" rel="noopener noreferrer">
            <button style={{ padding:"17px 40px", background:"linear-gradient(135deg,#E8823A,#c96820)", border:"none", borderRadius:"4px", color:"#fff", fontSize:"15px", fontFamily:SERIF, letterSpacing:"0.05em", boxShadow:"0 4px 28px rgba(232,130,58,0.38)", transition:"transform 0.15s, box-shadow 0.15s" }}
              onMouseEnter={e=>{e.target.style.transform="translateY(-2px)";e.target.style.boxShadow="0 8px 36px rgba(232,130,58,0.5)"}}

          </a>
          <a href="#demo">
            <button style={{ padding:"17px 40px", background:"transparent", border:"1px solid rgba(255,255,255,0.13)", borderRadius:"4px", color:"#666", fontSize:"15px", fontFamily:SERIF, letterSpacing:"0.05em", transition:"border-color 0.2s, color 0.2s" }}
              onMouseEnter={e=>{e.target.style.borderColor="rgba(232,130,58,0.4)";e.target.style.color=GOLD}}
              onMouseLeave={e=>{e.target.style.borderColor="rgba(255,255,255,0.13)";e.target.style.color="#666"}}>
              See how it works ↓
            </button>
          </a>
        </div>
        <div style={{ ...anim(0.58), marginTop:"64px", display:"flex", gap:"36px", justifyContent:"center", flexWrap:"wrap" }}>
          {["Thailand","Philippines","Indonesia"].map(c => (
            <span key={c} style={{ fontFamily:MONO, fontSize:"10px", color:"#303040", letterSpacing:"3px", textTransform:"uppercase" }}>{c}</span>
          ))}

/* ── Pain ── */
function Pain() {

/* ── CTA ── */
function CTA() {
  return (
    <section id="cta" style={{ padding:"120px 24px", background:"#0A0A10", borderTop:"1px solid rgba(255,255,255,0.04)", textAlign:"center", position:"relative", overflow:"hidden" }}>
      <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", width:"600px", height:"600px", borderRadius:"50%", background:"radial-gradient(circle,rgba(232,130,58,0.06) 0%,transparent 70%)", pointerEvents:"none" }}/>
      <div style={{ position:"relative", maxWidth:"560px", margin:"0 auto" }}>
        <h2 style={{ fontFamily:SERIF, fontSize:"clamp(28px,4.5vw,52px)", fontWeight:"400", color:"#E8E4DC", lineHeight:"1.15", margin:"0 0 20px" }}>
          Put your phone down.<br/><em style={{ color:GOLD }}>Your shop's got it.</em>
        </h2>
        <p style={{ fontFamily:SERIF, fontSize:"16px", color:"#4a4a5a", lineHeight:"1.95", marginBottom:"44px" }}>
          14 days free. No credit card.<br/>Works with the apps your customers already use.
        </p>
        <a href={FORM_URL} target="_blank" rel="noopener noreferrer">
          <button style={{ padding:"18px 52px", background:"linear-gradient(135deg,#E8823A,#c96820)", border:"none", borderRadius:"4px", color:"#fff", fontSize:"15px", fontFamily:SERIF, letterSpacing:"0.05em", boxShadow:"0 4px 32px rgba(232,130,58,0.4)", transition:"transform 0.15s, box-shadow 0.15s" }}
            onMouseEnter={e=>{e.target.style.transform="translateY(-2px)";e.target.style.boxShadow="0 8px 40px rgba(232,130,58,0.55)"}}
            onMouseLeave={e=>{e.target.style.transform="translateY(0)";e.target.style.boxShadow="0 4px 32px rgba(232,130,58,0.4)"}}>
            Start free — FUJIYAMA
          </button>
        </a>
        <div style={{ marginTop:"28px", fontFamily:MONO, fontSize:"10px", color:"#2a2a3a", letterSpacing:"3px" }}>
          THAILAND · PHILIPPINES · INDONESIA
        </div>
      </div>
    </section>
  );
}

/* ── Footer ── */
function Footer() {
  return (
    <footer style={{ padding:"32px", borderTop:"1px solid rgba(255,255,255,0.04)", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:"12px" }}>
      <div style={{ fontFamily:SERIF, fontSize:"15px", color:"#2a2a3a" }}>FUJIYAMA</div>
      <div style={{ fontFamily:MONO, fontSize:"10px", color:"#2a2a3a", letterSpacing:"2px" }}>© 2025 FUJIYAMA</div>
    </footer>
  );
}

/* ── App ── */
function App() {
  return (
    <div style={{ background:"#080810", minHeight:"100vh" }}>
      <Nav />
      <div style={{ paddingTop:"0" }}>
        <Hero />
        <Pain />
        <Demo />
        <How />
        <CTA />
        <Footer />
      </div>

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
